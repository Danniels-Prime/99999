name: Generate Gradle Wrapper
on:
  workflow_dispatch:

jobs:
  wrapper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install Gradle 8.3 and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.3/bin/gradle wrapper --gradle-version 8.3 --project-dir android
      - name: Commit gradle-wrapper.jar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.properties
          git diff --staged --quiet || git commit -m "Add gradle-wrapper.jar (generated by CI)"
          git push
