name: Build & Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.0)'
        required: true
        default: 'v1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS dependencies
        run: npm install

      # Installs Gradle 8.6 + handles caching — replaces wrapper jar issues
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Install ImageMagick and generate launcher icons
        run: |
          sudo apt-get install -y imagemagick
          for cfg in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${cfg%%:*}"; px="${cfg##*:}"
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert -size "${px}x${px}" xc:'#6c63ff' "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          mv "$APK" "OverlayLang-${TAG}.apk"
          gh release create "$TAG" "OverlayLang-${TAG}.apk" \
            --title "OverlayLang ${TAG}" \
            --notes '## Install
1. Download the APK below
2. Transfer to your Android phone
3. Open the file → tap Install (allow "install unknown apps" first)
4. Grant overlay + accessibility permissions → tap Start Monitoring

Once set up: copy any word, double-tap, or select text in any app → translation appears and reads aloud.' \
            --prerelease=false
