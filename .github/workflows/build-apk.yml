name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.0)'
        required: true
        default: 'v1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS dependencies
        run: npm install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate launcher icons
        run: |
          for cfg in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${cfg%%:*}"; px="${cfg##*:}"
            dir="android/app/src/main/res/mipmap-$density"
            mkdir -p "$dir"
            convert -size "${px}x${px}" xc:'#6c63ff' "$dir/ic_launcher.png"
            cp "$dir/ic_launcher.png" "$dir/ic_launcher_round.png"
          done

      - name: Regenerate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.6/bin/gradle wrapper --gradle-version 8.6 --project-dir android

      - name: Set up Android SDK components
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Generate debug keystore
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          mv "$APK" "OverlayLang-${TAG}.apk"
          gh release create "$TAG" "OverlayLang-${TAG}.apk" \
            --title "OverlayLang ${TAG}" \
            --notes $'## Install\n1. Download `OverlayLang-'"${TAG}"$'.apk` below\n2. Transfer to your Android phone\n3. Open the file → tap **Install** (allow "install unknown apps" first)\n4. Open the app → grant **Overlay** + **Accessibility** permissions → tap **Start Monitoring**\n\nOnce set up: copy any word, double-tap a word, or select text in any app → translation appears and reads aloud.' \
            --prerelease=false
